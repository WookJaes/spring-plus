spring:
  application:
    name: sparta-payment-system

  datasource:
    url: jdbc:mysql://localhost:3306/expert?serverTimezone=Asia/Seoul&rewriteBatchedStatements=true
    username: ${NAME}
    password: ${PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect
    defer-datasource-initialization: true

  sql:
    init:
      mode: always  # data.sql 자동 실행

# JWT 설정
jwt:
  secret:
    key: ${JWT_SECRET_KEY}